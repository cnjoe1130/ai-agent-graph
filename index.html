<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 生态概念图谱 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;
  --bg-secondary:rgba(15,20,30,.9);
  --bg-card:rgba(20,25,35,.95);
  --text-primary:#e0e0e0;
  --text-secondary:#a0a0a0;
  --text-muted:#606070;
  --border-color:rgba(100,140,200,.2);
  --accent:#4A90D9;
  --glow:rgba(74,144,217,.3);
}
[data-theme="light"]{
  --bg-primary:#f5f7fa;
  --bg-secondary:rgba(255,255,255,.95);
  --bg-card:rgba(255,255,255,.98);
  --text-primary:#1a1a2e;
  --text-secondary:#4a4a5a;
  --text-muted:#8a8a9a;
  --border-color:rgba(100,140,200,.15);
  --accent:#3a7bc8;
  --glow:rgba(58,123,200,.2);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 30%,rgba(74,144,217,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(155,89,182,.06) 0%,transparent 50%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse at 20% 30%,rgba(58,123,200,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(155,89,182,.04) 0%,transparent 50%)}
#graph{width:100vw;height:100vh;position:relative;z-index:1}
.node-label{font-size:10px;fill:var(--text-primary);text-anchor:middle;pointer-events:none;font-weight:500}
.node-label-zh{font-size:8px;fill:var(--text-secondary);text-anchor:middle;pointer-events:none}
.link{stroke-opacity:.2;transition:stroke-opacity .2s}
.link:hover{stroke-opacity:.6}
.link.highlighted{stroke-opacity:.8;stroke-width:2}
.link.compared{stroke-opacity:1;stroke-width:3;stroke-dasharray:5,3}
.tooltip{position:absolute;padding:16px 20px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;font-size:12px;max-width:380px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.3);backdrop-filter:blur(20px);z-index:1000;display:none;animation:tooltipIn .2s ease}
@keyframes tooltipIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tooltip h3{font-size:16px;margin-bottom:4px;font-weight:600}
.tooltip .zh{color:var(--text-secondary);font-size:12px;margin-bottom:8px}
.tooltip .cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding:4px 10px;border-radius:4px;display:inline-block;font-weight:500}
.tooltip .desc{line-height:1.6;color:var(--text-secondary);margin-bottom:10px}
.tooltip .meta{font-size:10px;color:var(--text-muted);border-top:1px solid var(--border-color);padding-top:8px}
.legend{position:absolute;top:20px;left:20px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:20px;font-size:12px;max-height:90vh;overflow-y:auto;z-index:100;min-width:220px;backdrop-filter:blur(20px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.legend h2{font-size:16px;margin-bottom:16px;font-weight:600}
.legend-item{display:flex;align-items:center;margin-bottom:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .2s}
.legend-item:hover{background:rgba(74,144,217,.1)}
.legend-item.inactive{opacity:.4}
.legend-dot{width:14px;height:14px;border-radius:50%;margin-right:10px;flex-shrink:0;box-shadow:0 2px 8px var(--glow)}
.legend-square{width:12px;height:12px;margin-right:10px;flex-shrink:0;border-radius:3px}
.legend-count{margin-left:auto;color:var(--text-muted);font-size:10px}
.controls{position:absolute;bottom:20px;right:20px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:16px;font-size:12px;z-index:100;backdrop-filter:blur(20px);display:flex;gap:12px;align-items:center}
.controls input{padding:8px 12px;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);border-radius:8px;width:220px;font-size:13px;transition:border-color .2s}
.controls input:focus{outline:none;border-color:var(--accent)}
.controls input::placeholder{color:var(--text-muted)}
.theme-btn,.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.theme-btn:hover,.icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{position:absolute;top:20px;right:20px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:20px;font-size:13px;z-index:100;backdrop-filter:blur(20px);min-width:180px}
.stats h3{font-size:15px;margin-bottom:12px;font-weight:600}
.stats-row{display:flex;justify-content:space-between;margin-bottom:6px}
.stats-val{color:var(--accent);font-weight:600}
.stats hr{border:none;border-top:1px solid var(--border-color);margin:10px 0}
.hint{position:absolute;bottom:20px;left:20px;color:var(--text-muted);font-size:12px;z-index:100;background:var(--bg-secondary);padding:8px 16px;border-radius:8px;border:1px solid var(--border-color)}
.detail-panel{position:absolute;top:50%;right:20px;transform:translateY(-50%);width:320px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;padding:0;z-index:200;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,.3);display:none;animation:panelIn .3s ease;overflow:hidden}
@keyframes panelIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.detail-panel.visible{display:block}
.detail-header{padding:24px;background:linear-gradient(135deg,var(--accent),rgba(155,89,182,.8));position:relative}
.detail-header h2{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
.detail-header .zh{font-size:13px;color:rgba(255,255,255,.8)}
.detail-header .close-btn{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.detail-header .close-btn:hover{background:rgba(255,255,255,.3)}
.detail-body{padding:20px 24px}
.detail-cat{font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:12px;font-weight:500}
.detail-desc{font-size:13px;line-height:1.7;color:var(--text-secondary);margin-bottom:16px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.detail-links{display:flex;flex-direction:column;gap:6px}
.detail-link{display:flex;align-items:center;padding:8px 12px;background:rgba(74,144,217,.1);border-radius:6px;color:var(--accent);text-decoration:none;font-size:12px;transition:background .2s}
.detail-link:hover{background:rgba(74,144,217,.2)}
.detail-link::before{content:'→';margin-right:8px}
.detail-related{display:flex;flex-wrap:wrap;gap:6px}
.detail-related-tag{padding:4px 10px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:4px;font-size:11px;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.detail-related-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.compare-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;max-width:90vw;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;z-index:300;backdrop-filter:blur(20px);box-shadow:0 12px 60px rgba(0,0,0,.4);display:none;animation:compareIn .3s ease;overflow:hidden}
@keyframes compareIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.compare-panel.visible{display:block}
.compare-header{padding:20px 24px;background:linear-gradient(135deg,var(--accent),#9B59B6);display:flex;justify-content:space-between;align-items:center}
.compare-header h2{font-size:18px;font-weight:600;color:#fff}
.compare-header .close-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.compare-body{padding:24px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.compare-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:12px;padding:20px;position:relative}
.compare-card h3{font-size:16px;font-weight:600;margin-bottom:4px}
.compare-card .zh{font-size:12px;color:var(--text-secondary);margin-bottom:12px}
.compare-card .cat-badge{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:12px}
.compare-card .desc{font-size:12px;line-height:1.6;color:var(--text-secondary);margin-bottom:16px}
.compare-card .stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-color);font-size:12px}
.compare-card .stat-label{color:var(--text-muted)}
.compare-card .stat-val{font-weight:600;color:var(--accent)}
.compare-card .vs-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.compare-instructions{text-align:center;padding:16px;color:var(--text-muted);font-size:13px}
.compare-instructions .icon{font-size:24px;margin-bottom:8px}
.export-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:400;display:none;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.compare-mode{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:250;display:none;animation:toastIn .3s ease}
.compare-mode.visible{display:flex;align-items:center;gap:12px}
.compare-mode .cancel{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.node.comparing circle,.node.comparing polygon{stroke:#fff!important;stroke-width:3!important;filter:url(#glow)!important}
@media(max-width:768px){.legend,.stats,.hint,.detail-panel,.compare-panel{display:none!important}.controls{bottom:10px;right:10px;left:10px;justify-content:center}}
</style>
</head>
<body>
<div id="graph"></div>
<div class="tooltip" id="tooltip"></div>
<div class="legend" id="legend">
<h2>🌐 AI Agent 生态 2026</h2>
<div id="legend-items"></div>
</div>
<div class="stats" id="stats"></div>
<div class="controls">
<input type="text" id="search" placeholder="🔍 搜索节点（中英文）">
<button class="icon-btn" id="compareBtn" title="对比模式">⚖️</button>
<button class="icon-btn" id="exportBtn" title="导出图片">📥</button>
<button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
</div>
<div class="hint">🖱 拖拽节点 · 🔍 滚轮缩放 · 👆 点击查看详情 · ⚖️ 对比模式</div>
<div class="detail-panel" id="detailPanel">
<div class="detail-header">
<button class="close-btn" id="closeDetail">×</button>
<h2 id="detailName"></h2>
<div class="zh" id="detailNameZh"></div>
</div>
<div class="detail-body">
<div class="detail-cat" id="detailCat"></div>
<div class="detail-desc" id="detailDesc"></div>
<div class="detail-section">
<div class="detail-section-title">连接数</div>
<div id="detailConnections" style="font-size:24px;font-weight:600;color:var(--accent)"></div>
</div>
<div class="detail-section">
<div class="detail-section-title">关联节点</div>
<div class="detail-related" id="detailRelated"></div>
</div>
</div>
</div>
<div class="compare-panel" id="comparePanel">
<div class="compare-header">
<h2>⚖️ 技术对比</h2>
<button class="close-btn" id="closeCompare">×</button>
</div>
<div class="compare-body" id="compareBody">
<div class="compare-instructions">
<div class="icon">👆</div>
点击图中两个节点进行对比<br>
<span style="font-size:11px;color:var(--text-muted)">支持同类型或不同类型的技术对比</span>
</div>
</div>
</div>
<div class="compare-mode" id="compareMode">
<span>⚖️ 对比模式已开启 — 点击选择两个节点</span>
<button class="cancel" id="cancelCompare">取消</button>
</div>
<div class="export-toast" id="exportToast">✅ 图片已保存到下载文件夹</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let currentTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', currentTheme);
document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';

document.getElementById('themeBtn').addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('theme', currentTheme);
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
});

// Compare mode
let compareMode = false;
let compareNodes = [];
const compareBtn = document.getElementById('compareBtn');
const compareModeEl = document.getElementById('compareMode');
const comparePanel = document.getElementById('comparePanel');
const compareBody = document.getElementById('compareBody');

compareBtn.addEventListener('click', () => {
  compareMode = !compareMode;
  compareBtn.classList.toggle('active', compareMode);
  compareModeEl.classList.toggle('visible', compareMode);
  if (compareMode) {
    compareNodes = [];
    node.classed('comparing', false);
    compareBody.innerHTML = '<div class="compare-instructions"><div class="icon">👆</div>点击图中两个节点进行对比<br><span style="font-size:11px;color:var(--text-muted)">支持同类型或不同类型的技术对比</span></div>';
    comparePanel.classList.add('visible');
  } else {
    comparePanel.classList.remove('visible');
    node.classed('comparing', false);
    link.classed('compared', false);
  }
});

document.getElementById('cancelCompare').addEventListener('click', () => {
  compareMode = false;
  compareBtn.classList.remove('active');
  compareModeEl.classList.remove('visible');
  comparePanel.classList.remove('visible');
  node.classed('comparing', false);
  link.classed('compared', false);
});

document.getElementById('closeCompare').addEventListener('click', () => {
  compareMode = false;
  compareBtn.classList.remove('active');
  compareModeEl.classList.remove('visible');
  comparePanel.classList.remove('visible');
  node.classed('comparing', false);
  link.classed('compared', false);
});

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  const svgEl = document.querySelector('#graph svg');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    ctx.scale(2, 2);
    ctx.fillStyle = currentTheme === 'dark' ? '#0a0e17' : '#f5f7fa';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'ai-agent-graph-' + new Date().toISOString().slice(0,10) + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    const toast = document.getElementById('exportToast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  };
  img.src = url;
});

fetch('data.json').then(r=>r.json()).then(data=>{
const nodes=data.nodes.map(d=>({...d})),links=[];
nodes.forEach(n=>{(n.relationships|| []).forEach(r=>{const t=nodes.find(x=>x.id===r.target);if(t)links.push({source:n.id,target:r.target,label:r.label,type:r.type,value:1})})});
const cc=Object.fromEntries(Object.entries(data.metadata.categories).map(([k,v])=>[k,v.color]));
const W=window.innerWidth,H=window.innerHeight;

// Stats
const statsEl=document.getElementById('stats'),catCounts={};
nodes.forEach(n=>{catCounts[n.category]=(catCounts[n.category]||0)+1});
statsEl.innerHTML='<h3>📊 统计</h3><div class="stats-row"><span>节点</span><span class="stats-val">'+nodes.length+'</span></div><div class="stats-row"><span>连接</span><span class="stats-val">'+links.length+'</span></div><div class="stats-row"><span>分类</span><span class="stats-val">'+Object.keys(catCounts).length+'</span></div><hr>'+Object.entries(catCounts).map(([k,v])=>{const c=data.metadata.categories[k];return '<div class="stats-row"><span style="color:'+(c?.color||'#888')+'">'+(c?.label_zh||k)+'</span><span class="stats-val">'+v+'</span></div>'}).join('');

// Legend with filter
const legendItems=document.getElementById('legend-items');
const activeCategories=new Set(Object.keys(data.metadata.categories));
Object.entries(data.metadata.categories).forEach(([key,cat])=>{
const item=document.createElement('div');
item.className='legend-item';
item.innerHTML=`<div class="legend-dot" style="background:${cat.color}"></div>${cat.label_zh}<span class="legend-count">${catCounts[key]||0}</span>`;
item.addEventListener('click',()=>{
if(activeCategories.has(key)){activeCategories.delete(key);item.classList.add('inactive')}
else{activeCategories.add(key);item.classList.remove('inactive')}
updateVisibility()});
legendItems.appendChild(item)});

function updateVisibility(){
node.style('opacity',d=>activeCategories.has(d.category)?1:.1);
link.style('opacity',l=>{const s=l.source.category,t=l.target.category;return(activeCategories.has(s)&&activeCategories.has(t))?.2:.03})}

const svg=d3.select('#graph').append('svg').attr('width',W).attr('height',H);
const defs=svg.append('defs');

// Glow filter
const filter=defs.append('filter').attr('id','glow');
filter.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
const fm=filter.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

// Shadow filter
const shadow=defs.append('filter').attr('id','shadow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
shadow.append('feDropShadow').attr('dx','0').attr('dy','2').attr('stdDeviation','3').attr('flood-opacity','0.3');

const g=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.1,5]).on('zoom',e=>g.attr('transform',e.transform)));

const sim=d3.forceSimulation(nodes)
.force('link',d3.forceLink(links).id(d=>d.id).distance(120).strength(0.3))
.force('charge',d3.forceManyBody().strength(d=>-d.size*25))
.force('center',d3.forceCenter(W/2,H/2))
.force('collision',d3.forceCollide().radius(d=>d.size+10))
.force('x',d3.forceX(W/2).strength(0.05))
.force('y',d3.forceY(H/2).strength(0.05));

const link=g.append('g').selectAll('line').data(links).enter().append('line')
.attr('class','link')
.attr('stroke',d=>cc[nodes.find(n=>n.id===(d.source.id||d.source))?.category]||'#555')
.attr('stroke-width',1);

const node=g.append('g').selectAll('g').data(nodes).enter().append('g')
.call(d3.drag()
.on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
.on('drag',(e,d)=>{d.fx=e.x;d.fy=d.y})
.on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

node.each(function(d){const el=d3.select(this),c=cc[d.category]||'#888',r=d.size/2;
if(d.category==='protocol'){el.append('polygon').attr('points','0,'+(-r)+' '+r+',0 0,'+r+' '+(-r)+',0').attr('fill',c).attr('fill-opacity',.8).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#glow)')}
else if(d.category==='concept'){el.append('polygon').attr('points','0,'+(-r)+' '+(r*.866)+','+(r*.5)+' '+(-r*.866)+','+(r*.5)).attr('fill',c).attr('fill-opacity',.7).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#shadow)')}
else if(d.category==='database'){const pts=[];for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/2;pts.push((r*Math.cos(a))+','+(r*Math.sin(a)))}el.append('polygon').attr('points',pts.join(' ')).attr('fill',c).attr('fill-opacity',.7).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#shadow)')}
else if(d.category==='player'){const pts=[];for(let i=0;i<10;i++){const a=(Math.PI/5)*i-Math.PI/2,rd=i%2===0?r:r*.4;pts.push((rd*Math.cos(a))+','+(rd*Math.sin(a)))}el.append('polygon').attr('points',pts.join(' ')).attr('fill',c).attr('fill-opacity',.8).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#glow)')}
else{el.append('circle').attr('r',r).attr('fill',c).attr('fill-opacity',.75).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#shadow)')}});

node.append('text').attr('class','node-label').attr('dy',d=>d.size/2+14).text(d=>d.name.length>20?d.name.substring(0,18)+'…':d.name);
node.append('text').attr('class','node-label-zh').attr('dy',d=>d.size/2+26).text(d=>d.name_zh&&d.name_zh!==d.name?(d.name_zh.length>18?d.name_zh.substring(0,16)+'…':d.name_zh):'');

// Tooltip
const tt=document.getElementById('tooltip');
node.on('mouseover',function(e,d){
if(compareMode){tt.style.display='block';tt.innerHTML='<h3>'+d.name+'</h3><div class="zh">'+(d.name_zh||'')+'</div><div class="meta">点击选择进行对比</div>';tt.style.left=(e.pageX+15)+'px';tt.style.top=(e.pageY-10)+'px';return}
tt.style.display='block';
const cat=data.metadata.categories[d.category];
const connCount=d.relationships?.length||0;
tt.innerHTML=`<h3>${d.name}</h3><div class="zh">${d.name_zh||''}</div><div class="cat" style="background:${(cat?.color||'#666')}20;color:${cat?.color||'#fff'}">${cat?.label_zh||d.category}</div><div class="desc">${d.description_zh||d.description||''}</div><div class="meta">连接数: ${connCount} · 点击查看详情</div>`;

const cn=new Set();
links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)cn.add(t);if(t===d.id)cn.add(s)});
cn.add(d.id);
node.style('opacity',n=>cn.has(n.id)?1:.15);
link.style('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===d.id||t===d.id)?.8:.05})
})
.on('mousemove',e=>{tt.style.left=(e.pageX+15)+'px';tt.style.top=(e.pageY-10)+'px'})
.on('mouseout',()=>{tt.style.display='none';if(!compareMode){node.style('opacity',1);link.style('opacity',.25)}});

// Click for detail panel or compare
const detailPanel=document.getElementById('detailPanel');
document.getElementById('closeDetail').addEventListener('click',()=>{
detailPanel.classList.remove('visible');
node.style('opacity',1);link.style('opacity',.25)});

node.on('click',function(e,d){
e.stopPropagation();

if(compareMode){
compareNodes.push(d);
d3.select(this).classed('comparing', true);
if(compareNodes.length===2){
showCompare(compareNodes[0], compareNodes[1]);
compareMode = false;
compareBtn.classList.remove('active');
compareModeEl.classList.remove('visible');
compareNodes = [];
}
return;
}

const cat=data.metadata.categories[d.category];
const connCount=d.relationships?.length||0;

document.getElementById('detailName').textContent=d.name;
document.getElementById('detailNameZh').textContent=d.name_zh||'';
const catEl=document.getElementById('detailCat');
catEl.textContent=cat?.label_zh||d.category;
catEl.style.background=`${cat?.color||'#666'}20`;
catEl.style.color=cat?.color||'#fff';
document.getElementById('detailDesc').textContent=d.description_zh||d.description||'暂无描述';
document.getElementById('detailConnections').textContent=connCount;

// Related nodes
const relatedEl=document.getElementById('detailRelated');
relatedEl.innerHTML='';
const related=new Set();
links.forEach(l=>{
const s=l.source.id||l.source,t=l.target.id||l.target;
if(s===d.id)related.add(t);
if(t===d.id)related.add(s)});
related.forEach(id=>{
const n=nodes.find(x=>x.id===id);
if(n){
const tag=document.createElement('span');
tag.className='detail-related-tag';
tag.textContent=n.name_zh||n.name;
tag.addEventListener('click',()=>{
const found=node.data().find(x=>x.id===id);
if(found)showDetail(found)});
relatedEl.appendChild(tag)}});

// Highlight connections
const cn=new Set();cn.add(d.id);
links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)cn.add(t);if(t===d.id)cn.add(s)});
node.style('opacity',n=>cn.has(n.id)?1:.15);
link.classed('highlighted',l=>(l.source.id===d.id||l.target.id===d.id));

detailPanel.classList.add('visible')});

function showDetail(d){
node.dispatch('click').filter(n=>n.id===d.id).node()}

function showCompare(a, b){
const catA = data.metadata.categories[a.category];
const catB = data.metadata.categories[b.category];
const connA = a.relationships?.length||0;
const connB = b.relationships?.length||0;
const common = new Set();
links.forEach(l=>{
const s=l.source.id||l.source,t=l.target.id||l.target;
if(s===a.id&&t===b.id)common.add(b.id);
if(t===a.id&&s===b.id)common.add(a.id);
if(s===a.id)common.add(t);
if(s===b.id)common.add(t);
if(t===a.id)common.add(s);
if(t===b.id)common.add(s);
});

compareBody.innerHTML=`
<div class="compare-grid">
<div class="compare-card">
<div class="vs-badge">A</div>
<h3>${a.name}</h3>
<div class="zh">${a.name_zh||''}</div>
<div class="cat-badge" style="background:${catA?.color||'#666'}30;color:${catA?.color||'#fff'}">${catA?.label_zh||a.category}</div>
<div class="desc">${a.description_zh||a.description||'暂无描述'}</div>
<div class="stat-row"><span class="stat-label">连接数</span><span class="stat-val">${connA}</span></div>
<div class="stat-row"><span class="stat-label">分类</span><span class="stat-val">${catA?.label_zh||a.category}</span></div>
<div class="stat-row"><span class="stat-label">英文名</span><span class="stat-val">${a.name}</span></div>
</div>
<div class="compare-card">
<div class="vs-badge">B</div>
<h3>${b.name}</h3>
<div class="zh">${b.name_zh||''}</div>
<div class="cat-badge" style="background:${catB?.color||'#666'}30;color:${catB?.color||'#fff'}">${catB?.label_zh||b.category}</div>
<div class="desc">${b.description_zh||b.description||'暂无描述'}</div>
<div class="stat-row"><span class="stat-label">连接数</span><span class="stat-val">${connB}</span></div>
<div class="stat-row"><span class="stat-label">分类</span><span class="stat-val">${catB?.label_zh||b.category}</span></div>
<div class="stat-row"><span class="stat-label">英文名</span><span class="stat-val">${b.name}</span></div>
</div>
</div>
<div style="margin-top:16px;padding:16px;background:var(--bg-primary);border-radius:8px;font-size:12px;color:var(--text-secondary)">
<strong style="color:var(--text-primary)">📊 对比分析</strong><br>
• ${a.name} 有 ${connA} 个关联，${b.name} 有 ${connB} 个关联<br>
• ${connA>connB?a.name:connB>connA?b.name:'两者'} 在生态中更活跃<br>
• ${catA?.label_zh===catB?.label_zh?'两者属于同一类别：'+catA?.label_zh:'类别不同：'+(catA?.label_zh||a.category)+' vs '+(catB?.label_zh||b.category)}
</div>`;

// Highlight connections between them
link.classed('compared', l=>(l.source.id===a.id&&l.target.id===b.id)||(l.source.id===b.id&&l.target.id===a.id));
}

svg.on('click',()=>{
if(!compareMode){
detailPanel.classList.remove('visible');
node.style('opacity',1);link.style('opacity',.25);
link.classed('highlighted',false)}});

// Search
document.getElementById('search').addEventListener('input',function(e){
const q=e.target.value.toLowerCase();
if(!q){node.style('opacity',1);link.style('opacity',.25);return}
const m=new Set();
nodes.forEach(n=>{if(n.name.toLowerCase().includes(q)||(n.name_zh&&n.name_zh.toLowerCase().includes(q))||(n.description&&n.description.toLowerCase().includes(q)))m.add(n.id)});
const cn=new Set(m);
links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(m.has(s))cn.add(t);if(m.has(t))cn.add(s)});
node.style('opacity',n=>m.size===0||cn.has(n.id)?1:.1);
link.style('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(m.has(s)||m.has(t))?.6:.03})});

sim.on('tick',()=>{
link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
node.attr('transform',d=>'translate('+d.x+','+d.y+')')});
});
</script>
</body>
</html>
