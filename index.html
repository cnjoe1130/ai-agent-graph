<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 生态概念图谱 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif;background:#0a0e17;color:#e0e0e0;overflow:hidden}
#graph{width:100vw;height:100vh}
.node-label{font-size:10px;fill:#c0c0c0;text-anchor:middle;pointer-events:none}
.node-label-zh{font-size:8px;fill:#808080;text-anchor:middle;pointer-events:none}
.link{stroke-opacity:.25}.link:hover{stroke-opacity:.8}
.tooltip{position:absolute;padding:12px 16px;background:rgba(20,25,35,.95);border:1px solid rgba(100,140,200,.3);border-radius:8px;font-size:12px;max-width:360px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);backdrop-filter:blur(10px);z-index:1000;display:none}
.tooltip h3{font-size:14px;margin-bottom:4px}.tooltip .zh{color:#888;font-size:11px;margin-bottom:6px}
.tooltip .cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:2px 6px;border-radius:3px;display:inline-block}
.tooltip .desc{line-height:1.5;color:#b0b0b0}
.legend{position:absolute;top:16px;left:16px;background:rgba(15,20,30,.9);border:1px solid rgba(100,140,200,.2);border-radius:8px;padding:16px;font-size:11px;max-height:90vh;overflow-y:auto;z-index:100;min-width:200px}
.legend h2{font-size:14px;margin-bottom:12px;color:#fff}
.legend-item{display:flex;align-items:center;margin-bottom:6px}
.legend-dot{width:12px;height:12px;border-radius:50%;margin-right:8px;flex-shrink:0}
.legend-square{width:10px;height:10px;margin-right:8px;flex-shrink:0;border-radius:2px}
.controls{position:absolute;bottom:16px;right:16px;background:rgba(15,20,30,.9);border:1px solid rgba(100,140,200,.2);border-radius:8px;padding:12px;font-size:11px;z-index:100}
.controls input{padding:4px 8px;border:1px solid #333;background:#1a1a2e;color:#e0e0e0;border-radius:4px;width:200px}
.stats{position:absolute;top:16px;right:16px;background:rgba(15,20,30,.9);border:1px solid rgba(100,140,200,.2);border-radius:8px;padding:16px;font-size:12px;z-index:100}
.stats h3{font-size:13px;margin-bottom:8px;color:#fff}
.stats-row{display:flex;justify-content:space-between;margin-bottom:4px}
.stats-val{color:#4A90D9;font-weight:600}
.hint{position:absolute;bottom:16px;left:16px;color:#5a6070;font-size:11px;z-index:100}
@media(max-width:768px){.legend,.stats,.hint{display:none}}
</style>
</head>
<body>
<div id="graph"></div>
<div class="tooltip" id="tooltip"></div>
<div class="legend">
<h2>🌐 AI Agent 生态 2026</h2>
<div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div>Agent 框架</div>
<div class="legend-item"><div class="legend-square" style="background:#E67E22"></div>协议</div>
<div class="legend-item"><div class="legend-dot" style="background:#2ECC71"></div>核心概念</div>
<div class="legend-item"><div class="legend-square" style="background:#9B59B6"></div>基础设施</div>
<div class="legend-item"><div class="legend-dot" style="background:#E74C3C"></div>主要玩家</div>
<div class="legend-item"><div class="legend-dot" style="background:#1ABC9C"></div>大模型</div>
<div class="legend-item"><div class="legend-square" style="background:#F39C12"></div>向量数据库</div>
<div class="legend-item"><div class="legend-dot" style="background:#3498DB"></div>应用</div>
</div>
<div class="stats" id="stats"></div>
<div class="controls"><input type="text" id="search" placeholder="🔍 搜索节点（中英文）"></div>
<div class="hint">🖱 拖拽节点 · 🔍 滚轮缩放 · 👆 悬停查看关联</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
fetch('data.json').then(r=>r.json()).then(data=>{
const nodes=data.nodes.map(d=>({...d})),links=[];
nodes.forEach(n=>{(n.relationships|| []).forEach(r=>{const t=nodes.find(x=>x.id===r.target);if(t)links.push({source:n.id,target:r.target,label:r.label,type:r.type,value:1})})});
const cc=Object.fromEntries(Object.entries(data.metadata.categories).map(([k,v])=>[k,v.color]));
const W=window.innerWidth,H=window.innerHeight;
const statsEl=document.getElementById('stats'),catCounts={};
nodes.forEach(n=>{catCounts[n.category]=(catCounts[n.category]||0)+1});
statsEl.innerHTML='<h3>📊 统计</h3><div class="stats-row"><span>节点</span><span class="stats-val">'+nodes.length+'</span></div><div class="stats-row"><span>连接</span><span class="stats-val">'+links.length+'</span></div><div class="stats-row"><span>分类</span><span class="stats-val">'+Object.keys(catCounts).length+'</span></div><hr style="border-color:#333;margin:8px 0">'+Object.entries(catCounts).map(([k,v])=>{const c=data.metadata.categories[k];return '<div class="stats-row"><span style="color:'+(c?.color||'#888')+'">'+(c?.label_zh||k)+'</span><span class="stats-val">'+v+'</span></div>'}).join('');
const svg=d3.select('#graph').append('svg').attr('width',W).attr('height',H);
const defs=svg.append('defs'),filter=defs.append('filter').attr('id','glow');
filter.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
const fm=filter.append('feMerge');fm.append('feMergeNode').attr('in','blur');fm.append('feMergeNode').attr('in','SourceGraphic');
const g=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.1,5]).on('zoom',e=>g.attr('transform',e.transform)));
const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(120).strength(0.3)).force('charge',d3.forceManyBody().strength(d=>-d.size*25)).force('center',d3.forceCenter(W/2,H/2)).force('collision',d3.forceCollide().radius(d=>d.size+10)).force('x',d3.forceX(W/2).strength(0.05)).force('y',d3.forceY(H/2).strength(0.05));
const link=g.append('g').selectAll('line').data(links).enter().append('line').attr('class','link').attr('stroke',d=>cc[nodes.find(n=>n.id===(d.source.id||d.source))?.category]||'#555').attr('stroke-width',1);
const node=g.append('g').selectAll('g').data(nodes).enter().append('g').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
node.each(function(d){const el=d3.select(this),c=cc[d.category]||'#888',r=d.size/2;
if(d.category==='protocol'){el.append('polygon').attr('points','0,'+(-r)+' '+r+',0 0,'+r+' '+(-r)+',0').attr('fill',c).attr('fill-opacity',.8).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#glow)')}
else if(d.category==='concept'){el.append('polygon').attr('points','0,'+(-r)+' '+(r*.866)+','+(r*.5)+' '+(-r*.866)+','+(r*.5)).attr('fill',c).attr('fill-opacity',.7).attr('stroke',c).attr('stroke-width',1.5)}
else if(d.category==='database'){const pts=[];for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/2;pts.push((r*Math.cos(a))+','+(r*Math.sin(a)))}el.append('polygon').attr('points',pts.join(' ')).attr('fill',c).attr('fill-opacity',.7).attr('stroke',c).attr('stroke-width',1.5)}
else if(d.category==='player'){const pts=[];for(let i=0;i<10;i++){const a=(Math.PI/5)*i-Math.PI/2,rd=i%2===0?r:r*.4;pts.push((rd*Math.cos(a))+','+(rd*Math.sin(a)))}el.append('polygon').attr('points',pts.join(' ')).attr('fill',c).attr('fill-opacity',.8).attr('stroke',c).attr('stroke-width',1.5).attr('filter','url(#glow)')}
else{el.append('circle').attr('r',r).attr('fill',c).attr('fill-opacity',.75).attr('stroke',c).attr('stroke-width',1.5)}});
node.append('text').attr('class','node-label').attr('dy',d=>d.size/2+12).text(d=>d.name.length>20?d.name.substring(0,18)+'…':d.name);
node.append('text').attr('class','node-label-zh').attr('dy',d=>d.size/2+24).text(d=>d.name_zh&&d.name_zh!==d.name?(d.name_zh.length>18?d.name_zh.substring(0,16)+'…':d.name_zh):'');
const tt=document.getElementById('tooltip');
node.on('mouseover',function(e,d){tt.style.display='block';const cat=data.metadata.categories[d.category];
tt.innerHTML='<h3>'+d.name+'</h3><div class="zh">'+d.name_zh+'</div><div class="cat" style="background:'+(cat?.color||'#666')+'40;color:'+(cat?.color||'#fff')+'">'+(cat?.label_zh||d.category)+'</div><div class="desc">'+(d.description_zh||d.description||'')+'</div><div style="margin-top:8px;font-size:10px;color:#666">连接数: '+(d.relationships?.length||0)+'</div>';
const cn=new Set();links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(s===d.id)cn.add(t);if(t===d.id)cn.add(s)});cn.add(d.id);
node.style('opacity',n=>cn.has(n.id)?1:.15);link.style('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(s===d.id||t===d.id)?.8:.05})})
.on('mousemove',e=>{tt.style.left=(e.pageX+15)+'px';tt.style.top=(e.pageY-10)+'px'})
.on('mouseout',()=>{tt.style.display='none';node.style('opacity',1);link.style('opacity',.25)});
document.getElementById('search').addEventListener('input',function(e){const q=e.target.value.toLowerCase();
if(!q){node.style('opacity',1);link.style('opacity',.25);return}
const m=new Set();nodes.forEach(n=>{if(n.name.toLowerCase().includes(q)||(n.name_zh&&n.name_zh.toLowerCase().includes(q))||(n.description&&n.description.toLowerCase().includes(q)))m.add(n.id)});
const cn=new Set(m);links.forEach(l=>{const s=l.source.id||l.source,t=l.target.id||l.target;if(m.has(s))cn.add(t);if(m.has(t))cn.add(s)});
node.style('opacity',n=>m.size===0||cn.has(n.id)?1:.1);link.style('opacity',l=>{const s=l.source.id||l.source,t=l.target.id||l.target;return(m.has(s)||m.has(t))?.6:.03})});
sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>'translate('+d.x+','+d.y+')')});
});
</script>
</body>
</html>
